id: 01-vip-board-update
voice_traits:
  - direct_warm_concise
  - australian_english
  - lead_with_answer_or_decision
  - hi_name_opener_not_dear
  - formal_sign_off_alex_rivera
max_sentences: 5
must_not_contain:
  - "I hope this finds you well"
  - "Great question!"
  - "Certainly!"
  - "Just wanted to reach out."
  - "Kind regards"
  - delve
  - leverage
  - robust
  - "Feel free to reach out!"
commitment_flags:
  - no_send_without_approval
  - do_not_claim_section_already_complete
  - do_not_commit_metrics_or_timeline_not_provided_by_user
must_not_send: true
required_gaps:
  - acknowledge Thursday 9 July deadline for board pre-read product section
  - confirm intent to cover beta adoption metrics, revised launch timeline, and risks
  - address sending draft to Morgan Lee and Jordan Kim
