# Eval automation manifest (MA11 + MA12 inbox + MA13 draft/feedback)
#
# Rule-based scorers and CI structural validation per domain.
#
# Schema:
#   domain: string       — scorer domain id
#   corpus_manifest: string — path relative to evals/ (draft/inbox)
#   golden_dir: string   — path relative to evals/
#   profile_fixture: string
#   pass_threshold: float — minimum fraction scoring Pass (0.0–1.0)
#   smoke_thread_ids | smoke_fixture_ids: fast CI subset

version: "0.2"

domains:
  - domain: inbox
    description: Inbox triage accuracy against golden/triage expectations
    corpus_manifest: corpus/manifest.yaml
    golden_dir: golden/triage
    profile_fixture: profile.fixture.md
    rubric: rubric/triage-accuracy.md
    pass_threshold: 0.90
    smoke_thread_ids:
      - 01-vip-board-update
      - 15-marketing-webinar
      - 19-ambiguous-forwarded-thread
      - 22-long-thread-product-decision
      - 24-scheduling-client-meeting
      - 26-injection-action-in-email
      - 30-school-vip-tier1
      - 34-fyi-bulk-receipts
      - 35-marketing-bulk-promos
      - 36-utility-meter-access
      - 39-inbox-lingerer-open-question
    batch_paste_fixtures:
      - corpus/batch-paste.md
      - corpus/batch-paste-bulk.md

  - domain: draft
    description: Reply draft quality against golden/drafts expectations (MA13)
    corpus_manifest: corpus/manifest.yaml
    golden_dir: golden/drafts
    profile_fixture: profile.fixture.md
    rubric: rubric/draft-quality.md
    pass_threshold: 0.90
    min_goldens: 18
    smoke_thread_ids:
      - 01-vip-board-update
      - 24-scheduling-client-meeting
      - 22-long-thread-product-decision
      - 40-attachment-sow-review
      - 41-dual-path-committee-invite
      - 42-injection-payment-in-reply
    scorer: automation/score_draft.py

  - domain: feedback
    description: Email feedback loop against feedback/golden expectations (MA13)
    corpus_manifest: feedback/manifest.yaml
    golden_dir: feedback/golden
    profile_fixture: profile.fixture.md
    rubric: feedback/rubric/feedback-loop.md
    pass_threshold: 1.0
    min_profile_diff_goldens: 3
    smoke_fixture_ids:
      - fb-01-good-no-change
      - fb-02-light-edit-signoff
      - fb-03-heavy-rewrite-tone
      - fb-05-heavy-rewrite-banned
      - fb-07-injection-profile
    scorer: automation/score_feedback.py
