# Corpus manifest — index of synthetic inbox threads for eval runs.
#
# Schema (per thread entry):
#   id: string          — unique thread id (e.g. "01-vip-board-update")
#   file: string        — path relative to evals/ (e.g. corpus/threads/01-vip-board-update.md)
#   category: string    — VIP | Needs-reply | FYI | Marketing | Ambiguous | Long-thread | Scheduling
#   tags: [string]      — optional labels (e.g. "ambiguous", "vip-tier-1")
#   skill: string       — skill under test (e.g. inbox-triage)
#   golden_triage: string — path to golden/triage/{id}.yaml
#   draft_required: bool — whether draft review is expected
#
# Minimum 25 threads when the corpus is complete (see design.md corpus categories table).

threads:
  - id: 01-vip-board-update
    file: corpus/threads/01-vip-board-update.md
    category: VIP
    tags: [vip-tier-1, board]
    skill: inbox-triage
