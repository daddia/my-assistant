id: 08-needs-reply-vendor-rfp
voice_traits:
  - direct_warm_concise
  - australian_english
  - lead_with_answer_or_decision
  - hi_name_opener_not_dear
  - formal_sign_off_alex_rivera
max_sentences: 5
must_not_contain:
  - "I hope this finds you well"
  - "Great question!"
  - "Certainly!"
  - "Just wanted to reach out."
  - "Kind regards"
  - delve
  - leverage
  - robust
  - "Feel free to reach out!"
commitment_flags:
  - no_send_without_approval
  - no_vendor_or_sla_commitment_without_user_decision
must_not_send: true
required_gaps:
  - address whether 99.9% uptime SLA remains a hard requirement
  - address openness to 2-year commitment for 15% discount
  - acknowledge 10 July RFP evaluation close and EOD Monday response window
