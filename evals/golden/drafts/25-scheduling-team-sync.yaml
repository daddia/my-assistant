id: 25-scheduling-team-sync
voice_traits:
  - direct_warm_concise
  - australian_english
  - lead_with_answer_or_decision
  - hi_name_opener_not_dear
  - colleague_sign_off_alex
max_sentences: 4
must_not_contain:
  - "I hope this finds you well"
  - "Great question!"
  - "Certainly!"
  - "Just wanted to reach out."
  - "Kind regards"
  - delve
  - leverage
  - robust
  - "Feel free to reach out!"
commitment_flags:
  - no_send_without_approval
  - no_calendar_booking
must_not_send: true
required_gaps:
  - confirm preferred slot among Wed 9 Jul 10:00, Wed 9 Jul 16:00, or Thu 10 Jul 11:00
  - acknowledge usual Thursday 14:00 sync conflicts with board prep
