id: 24-scheduling-client-meeting
voice_traits:
  - direct_warm_concise
  - australian_english
  - lead_with_answer_or_decision
  - hi_name_opener_not_dear
  - formal_sign_off_alex_rivera
max_sentences: 5
must_not_contain:
  - "I hope this finds you well"
  - "Great question!"
  - "Certainly!"
  - "Just wanted to reach out."
  - "Kind regards"
  - delve
  - leverage
  - robust
  - "Feel free to reach out!"
commitment_flags:
  - no_send_without_approval
  - no_calendar_booking
must_not_send: true
required_gaps:
  - propose 2-3 specific morning AEST slots for 45-minute quarterly beta review in next two weeks
  - acknowledge Singapore UTC+8 timezone and topics adoption metrics, support tickets, and Q4 roadmap
