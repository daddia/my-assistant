name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Structural validation
        run: python3 scripts/validate.py --format json

      - name: Validate eval fixtures
        run: python3 scripts/validate_fixtures.py

      - name: Validate inbox golden structure (MA12)
        run: python3 evals/automation/score_inbox.py --validate-goldens

      - name: Test update_ledger.py
        run: python3 scripts/test_update_ledger.py
