name: Validate eval fixtures

on:
  pull_request:
    paths:
      - 'evals/**'
      - '.github/workflows/validate-fixtures.yml'
  push:
    branches:
      - main
    paths:
      - 'evals/**'
      - '.github/workflows/validate-fixtures.yml'

jobs:
  validate-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run structural validation
        run: LANG=en_US.UTF-8 ./evals/scripts/validate-fixtures.sh
