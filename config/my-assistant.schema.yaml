# Schema for {assistantPath}/config/my-assistant.json
# Selective machine-readable install config — not a duplicate of profile.md.
# Human personalisation (voice, VIP, policy) stays in profile.md and {assistantPath}/policies/*.policy.md.

version: "1"
description: My Assistant install config written by /assistant:setup

required:
  - version
  - assistantPath
  - configPath
  - policiesPath
  - scope
  - setupAt
  - lastUpdated

properties:
  version:
    type: string
    const: "1"
    description: Schema version for forward-compatible reads

  assistantPath:
    type: string
    description: Absolute path to the working folder (default ~/MyAssistant)

  configPath:
    type: string
    description: Absolute path to the config subdirectory ({assistantPath}/config)

  policiesPath:
    type: string
    description: Absolute path to the policies directory ({assistantPath}/policies)

  scope:
    type: string
    enum: [personal, work, both]
    description: Personal-only, work-only, or both — from setup working rules

  platform:
    type: string
    enum: [cowork, cursor, claude-code, unknown]
    description: Host runtime detected at setup

  setupAt:
    type: string
    format: date-time
    description: ISO-8601 timestamp when setup first created this file

  lastUpdated:
    type: string
    format: date-time
    description: ISO-8601 timestamp when this file was last written

example:
  version: "1"
  assistantPath: /Users/jane/MyAssistant
  configPath: /Users/jane/MyAssistant/config
  policiesPath: /Users/jane/MyAssistant/policies
  scope: personal
  platform: cowork
  setupAt: "2026-07-10T12:00:00+10:00"
  lastUpdated: "2026-07-11T09:30:00+10:00"
