# Notetaker export format fingerprints — declarative hints for meeting-follow-up.
# Skills read this at runtime; not executable code. Add vendors by extending formats.
#
# Each format lists detection signals (any match is a hint; multiple matches increase
# confidence) and normalization notes the skill applies before extraction.

version: "0.1"

formats:
  - format_id: granola
    display_name: Granola export
    detection_signals:
      - "**Source:** Granola"
      - "[HH:MM:SS] Speaker:"
      - "Granola —"
    normalization:
      - Preserve speaker attribution from timestamped blocks
      - Strip Granola footer boilerplate (e.g. "_End of transcript_", export metadata footers)

  - format_id: fireflies
    display_name: Fireflies.ai export
    detection_signals:
      - Fireflies.ai
      - "## Action Items"
      - "## Overview"
      - "Meeting Summary"
    normalization:
      - Prefer structured Action Items block over free transcript when both present
      - Map Overview section bullets to decisions when explicit

  - format_id: otter
    display_name: Otter.ai export
    detection_signals:
      - Otter.ai
      - "Speaker 1"
      - "Speaker 2"
    normalization:
      - Merge consecutive lines from the same speaker label
      - Preserve named speaker labels when present instead of "Speaker N"

  - format_id: google-meet
    display_name: Google Meet / Gemini notes
    detection_signals:
      - "Notes by Gemini"
      - "Meeting records"
      - "Generated by Google"
    normalization:
      - Expect sparse structure; flag low-confidence extraction when notes are thin
      - Do not fabricate decisions or action items not present in the paste

  - format_id: hand-typed
    display_name: Hand-typed notes
    detection_signals: []
    normalization:
      - Default when no vendor fingerprint matches
      - Skip format-specific normalization; use the same extraction schema
