# Schedule health ledger schema — machine-readable shape for scheduled/{job_id}.yaml
#
# Authoritative contract for scheduled-run skills and miss-detection logic.
# Working-folder location: {working-folder}/scheduled/{job_id}.yaml (one file per job)
# Never write health files under the plugin directory (see rules/file-safety.md).
#
# Validation: compare fixture items in evals/schedule-health/fixtures/*/*.yaml
# against this schema; see evals/schedule-health/README.md.

version: "0.1"

# ---------------------------------------------------------------------------
# Enumerations
# ---------------------------------------------------------------------------
surfaces:
  - local
  - cloud-code
  - managed

run_statuses:
  - success
  - partial
  - failed
  - missed

# ---------------------------------------------------------------------------
# Per-job file fields (scheduled/{job_id}.yaml)
# ---------------------------------------------------------------------------
job_file_fields:
  version:
    required: true
    type: string
    description: Schema version, e.g. "0.1"

  job_id:
    required: true
    type: string
    description: Stable slug from config/schedules.yaml; must match the filename stem

  updated_at:
    required: true
    type: datetime
    format: ISO-8601
    description: Timestamp of the last ledger write for this job

  surface:
    required: true
    type: enum
    enum: [local, cloud-code, managed]
    description: Deployment surface the user chose during /assistant:schedules

  cadence:
    required: true
    type: string
    description: Cron expression copied from schedules.yaml at setup time

  last_run_at:
    required: true
    type: datetime
    format: ISO-8601
  # null when the job has never completed a scheduled run

  last_run_status:
    required: true
    type: enum
    enum: [success, partial, failed, missed]

  expected_artifact:
    required: false
    type: string
    description: Resolved artefact path for the most recent expected run (e.g. brief-2026-07-08.md)

  artifact_present:
    required: false
    type: boolean
    description: Whether expected_artifact exists in the working folder

  miss_count_7d:
    required: true
    type: integer
    minimum: 0
    description: Rolling counter incremented when miss detection fires on interactive runs

  notes:
    required: false
    type: string
    description: Freeform context (e.g. laptop asleep on local surface)

# ---------------------------------------------------------------------------
# Examples
# ---------------------------------------------------------------------------
examples:
  version: "0.1"
  job_id: morning-briefing
  updated_at: "2026-07-08T08:05:00+10:00"
  surface: local
  cadence: "0 8 * * 1-5"
  last_run_at: "2026-07-08T08:02:00+10:00"
  last_run_status: success
  expected_artifact: brief-2026-07-08.md
  artifact_present: true
  miss_count_7d: 0
  notes: null
